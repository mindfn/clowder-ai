# F140 Guide Flow: Bootcamp Add Teammate
# First-run quest — after cat delivers first project, guide user to add a second cat.
# Auto-triggered when bootcamp Phase 4 (first-project) completes.
# Schema: OrchestrationFlow v2 (tag-based engine)

schemaVersion: 1
id: bootcamp-add-teammate
name: 添加第二只猫猫
description: 看完猫猫做的效果后，添加第二只猫猫队友来协作

steps:
  - id: preview-result
    target: bootcamp.preview-result
    tips: 看看猫猫做的效果！点击聊天中的链接打开预览
    advance: click

  - id: open-hub
    target: hub.trigger
    tips: 觉得有改进空间？点击 ⚙️ 设置，添加一只新猫猫来帮忙！
    advance: click

  - id: go-to-cats
    target: cats.overview
    tips: 进入成员管理页面
    advance: click

  - id: click-add-member
    target: cats.add-member
    tips: 点击这里开始添加新成员
    advance: click

  - id: select-template
    target: add-member.template-picker
    tips: 选个模板一键创建猫猫队友！
    advance: click

  - id: edit-member-profile
    target: member-editor.profile
    tips: 填写猫猫信息，选择客户端和模型，然后点击保存
    advance: confirm

  - id: return-to-chat
    target: hub.close
    tips: 关闭设置页面，回到对话
    advance: click

  - id: mention-teammate
    target: chat.input
    tips: 试试 @新猫名 来评价下刚才的工作，看看怎么继续优化
    advance: input
