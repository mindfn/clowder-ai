content: |
  **反模式：忽略用户假设，自行编造理论**
  
  用户提出假设时（如"是不是X有问题"），必须先验证X，不要跳过直接生成自己的理论。
  
  **案例：** gitcode-cli skill 不被 opus 加载。用户一开始就指出"是不是skill描述有问题的"。布偶猫没有检查描述，而是连续编造了多个错误理论（时序问题、项目级优先级、symlink 校验），全部错误。浪费了10+轮对话。最终发现用户的假设完全正确——skill description 没有覆盖 gitcode.com URL 触发场景。
  
  **规则：** 用户指向具体检查目标时，先做检查（读文件、对比数据、验证声明）。排除后再找其他方向。用推理代替直接验证 = 瞎猜。
  
  **适用范围：** 所有猫、所有项目。这是协作纪律问题，不是技术问题。
