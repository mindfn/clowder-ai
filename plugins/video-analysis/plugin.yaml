id: video-analysis
name: 视频分析
version: "1.0.0"
description: 声明式视频理解与分析 — 通过视频协议模板适配 Gemini、智谱等
icon: monitor-wave
iconBg: "#0ea5e9"

config:
  - envName: VIDEO_ANALYSIS_PROVIDER
    label: 视频协议
    type: select
    sensitive: false
    required: true
    options:
      - value: gemini
        label: Gemini
        hint: 在 Google AI Studio 获取 API Key
        docsUrl: https://ai.google.dev/gemini-api/docs
      - value: zhipu
        label: 智谱
        hint: 在智谱开放平台注册，获取 API Key
        docsUrl: https://docs.bigmodel.cn/cn/guide/models/vlm

  - envName: VIDEO_ANALYSIS_AUTH_TYPE
    label: 认证方式
    type: select
    sensitive: false
    required: true
    options:
      - value: apikey
        label: API Key
        supportedBy:
          VIDEO_ANALYSIS_PROVIDER: [gemini, zhipu]
      - value: query-param
        label: Query Parameter
        supportedBy:
          VIDEO_ANALYSIS_PROVIDER: [gemini]
    oneOf:
      apikey:
        - { envName: VIDEO_ANALYSIS_API_KEY, label: API Key, sensitive: true }
        - { envName: VIDEO_ANALYSIS_BASE_URL, label: Base URL, sensitive: false, required: false, zh_notes: "https://open.bigmodel.cn" }
        - { envName: VIDEO_ANALYSIS_MODEL, label: 模型名称, sensitive: false, required: false, zh_notes: "glm-4.6v-flash" }
      query-param:
        - { envName: VIDEO_ANALYSIS_API_KEY, label: API Key, sensitive: true }
        - { envName: VIDEO_ANALYSIS_BASE_URL, label: Base URL, sensitive: false, required: false, zh_notes: "https://generativelanguage.googleapis.com" }
        - { envName: VIDEO_ANALYSIS_MODEL, label: 模型名称, sensitive: false, required: false, zh_notes: "gemini-2.0-flash" }

resources:
  - type: mcp
    name: video-analysis-toolset
    command: node
    args: ["packages/mcp-server/dist/protocol-server.js", "--prefix", "VIDEO_ANALYSIS", "--protocols-dir", "plugins/video-analysis/protocols"]
  - type: protocol
    path: protocols/
