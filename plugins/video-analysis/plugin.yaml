id: video-analysis
name: 视频分析
version: "1.0.0"
description: 声明式视频理解与分析 — 通过视频协议模板适配 Gemini、智谱 VLM 等
icon: search-pulse
iconBg: "#0ea5e9"

config:
  - envName: VIDEO_ANALYSIS_PROVIDER
    label: 视频协议
    type: select
    sensitive: false
    required: true
    options:
      - value: gemini
        label: Gemini
        hint: 在 Google AI Studio 获取 API Key
        docsUrl: https://ai.google.dev/gemini-api/docs
      - value: zhipu-vlm
        label: 智谱 VLM
        hint: 在智谱开放平台注册，获取 API Key
        docsUrl: https://open.bigmodel.cn/dev/api/multimodal

  - envName: VIDEO_ANALYSIS_AUTH_TYPE
    label: 认证方式
    type: select
    sensitive: false
    required: true
    options:
      - { value: apikey, label: API Key }
      - { value: query-param, label: Query Parameter }
    oneOf:
      apikey:
        - { envName: VIDEO_ANALYSIS_API_KEY, label: API Key, sensitive: true }
      query-param:
        - { envName: VIDEO_ANALYSIS_API_KEY, label: API Key, sensitive: true }

  - envName: VIDEO_ANALYSIS_BASE_URL
    label: Base URL
    sensitive: false
    required: false

  - envName: VIDEO_ANALYSIS_MODEL
    label: 模型名称
    sensitive: false
    required: false

resources:
  - type: mcp
    name: video-analysis-toolset
  - type: protocol
    path: protocols/
