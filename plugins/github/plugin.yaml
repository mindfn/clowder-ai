id: github
name: GitHub
version: "1.0.0"
description: PR Tracking, Review Router, CI/CD Monitor
icon: git-branch
iconBg: "#24292e"

docsUrl: https://github.com/settings/tokens
setupSteps:
  - 在 GitHub 创建 Personal Access Token，需要 repo 权限
  - Token 用于 PR 追踪、Review 路由、CI/CD 状态同步

config:
  - envName: GITHUB_TOKEN
    label: Personal Access Token
    sensitive: true
    required: true
  - envName: GITHUB_SETUP_NOISE_BOT_LOGINS
    label: Noise 过滤 Bot 列表
    sensitive: false
    required: false
  - envName: GITHUB_MCP_PAT
    label: MCP 专用 Token
    sensitive: true
    required: false

resources: []
