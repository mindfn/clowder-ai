<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 猫猫待办清单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fdf6f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header .paw { font-size: 2.4rem; display: block; margin-bottom: 6px; }
    header h1 { font-size: 1.5rem; color: #5c3d2e; font-weight: 700; }
    header p { font-size: 0.85rem; color: #a07860; margin-top: 4px; }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e8d5c4;
      border-radius: 12px;
      font-size: 0.95rem;
      background: #fff;
      color: #3d2b1f;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-row input:focus { border-color: #c9956a; }
    .add-row input::placeholder { color: #c4a98a; }

    .add-row button {
      padding: 10px 18px;
      background: #c9956a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .add-row button:hover { background: #b07d55; }
    .add-row button:active { transform: scale(0.96); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 5px 14px;
      border: 2px solid #e8d5c4;
      border-radius: 20px;
      background: #fff;
      color: #a07860;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #c9956a;
      border-color: #c9956a;
      color: #fff;
    }

    .list { list-style: none; }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 2px solid #f0e2d4;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.done { opacity: 0.55; border-color: #e8d5c4; }

    .check {
      width: 22px; height: 22px;
      border: 2px solid #e8d5c4;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: all 0.15s;
      background: #fff;
    }
    .check:hover { border-color: #c9956a; }
    .item.done .check { background: #c9956a; border-color: #c9956a; }

    .text {
      flex: 1;
      font-size: 0.95rem;
      color: #3d2b1f;
      word-break: break-word;
    }
    .item.done .text { text-decoration: line-through; color: #b09080; }

    .del {
      background: none;
      border: none;
      color: #d4bfb0;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .del:hover { color: #c0392b; background: #fdecea; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #c4a98a;
      font-size: 0.9rem;
    }
    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #c4a98a;
    }

    .footer button {
      background: none;
      border: none;
      color: #c4a98a;
      cursor: pointer;
      font-size: 0.78rem;
      text-decoration: underline;
    }
    .footer button:hover { color: #a07860; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <span class="paw">🐾</span>
    <h1>猫猫待办清单</h1>
    <p>把今天要做的事交给宪宪记着～</p>
  </header>

  <div class="add-row">
    <input id="inp" type="text" placeholder="添加一件事…" maxlength="120">
    <button id="addBtn" title="添加">＋</button>
  </div>

  <div class="filters">
    <button class="active" data-f="all">全部</button>
    <button data-f="active">待做</button>
    <button data-f="done">已完成</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span id="count"></span>
    <button id="clearDone">清除已完成</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'cat-todo-items';

  const uuid = () => crypto.randomUUID?.() ?? Math.random().toString(36).slice(2) + Date.now();

  let filter = 'all';
  let items = load();

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('list');
    const visible = items.filter(i =>
      filter === 'all' ? true : filter === 'done' ? i.done : !i.done
    );

    list.innerHTML = '';

    if (visible.length === 0) {
      const allDone = items.length > 0 && items.every(i => i.done);
      const emptyIcon = filter === 'done' ? '😸' : (filter === 'active' && allDone) ? '🎉' : '🌸';
      const emptyText = filter === 'done' ? '还没有完成的事～' : (filter === 'active' && allDone) ? '全做完啦！' : '没有待办事项啦～';
      list.innerHTML = `<div class="empty"><span>${emptyIcon}</span>${emptyText}</div>`;
    } else {
      visible.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');
        li.innerHTML = `
          <div class="check" role="checkbox" aria-checked="${item.done}" aria-label="${item.done ? '取消完成' : '标记完成'}" tabindex="0" data-id="${item.id}">${item.done ? '🐾' : ''}</div>
          <span class="text">${escHtml(item.text)}</span>
          <button class="del" data-id="${item.id}" title="删除" aria-label="删除此事项">✕</button>
        `;
        list.appendChild(li);
      });
    }

    const active = items.filter(i => !i.done).length;
    document.getElementById('count').textContent =
      `${active} 件待做 / 共 ${items.length} 件`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addItem() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    items.unshift({ id: uuid(), text, done: false });
    inp.value = '';
    save(); render();
  }

  document.getElementById('addBtn').addEventListener('click', addItem);
  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) addItem();
  });

  document.getElementById('list').addEventListener('click', e => {
    const checkEl = e.target.closest('.check');
    const delEl = e.target.closest('.del');

    if (checkEl) {
      const id = checkEl.dataset.id;
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; save(); render(); }
    }

    if (delEl) {
      const id = delEl.dataset.id;
      items = items.filter(i => i.id !== id);
      save(); render();
    }
  });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.f;
      render();
    });
  });

  document.getElementById('clearDone').addEventListener('click', () => {
    items = items.filter(i => !i.done);
    save(); render();
  });

  document.getElementById('list').addEventListener('dblclick', e => {
    const textEl = e.target.closest('.text');
    if (!textEl) return;
    const id = textEl.closest('.item').querySelector('.check').dataset.id;
    const item = items.find(i => i.id === id);
    if (!item) return;

    const inp = document.createElement('input');
    inp.value = item.text;
    inp.style.cssText = 'flex:1;padding:2px 6px;font-size:0.95rem;border:2px solid #c9956a;border-radius:6px;outline:none;background:#fff;';

    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      const newText = inp.value.trim();
      if (newText) item.text = newText;
      save(); render();
    };

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) commit();
      if (e.key === 'Escape') { committed = true; render(); }
    });
    inp.addEventListener('blur', commit);

    textEl.replaceWith(inp);
    inp.focus();
    inp.select();
  });

  render();
</script>
</body>
</html>
