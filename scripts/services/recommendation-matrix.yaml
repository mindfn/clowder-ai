# ============================================================
# Service Recommendation Matrix
# ============================================================
# Maps detected environment (OS × Arch × GPU × Python Arch) to
# a list of available models, OR an unsupported reason with
# user-action guidance.
#
# Lookup is ORDER-SENSITIVE: first matching entry wins.
# Put MORE SPECIFIC match criteria (e.g. gpu=cuda) BEFORE
# generic ones (e.g. no gpu key).
#
# Schema:
#   services:
#     <service-id>:
#       - match:                      # all keys optional, AND-combined
#           os: darwin|win32|linux | [darwin, linux]
#           arch: arm64|x64
#           gpu: apple|cuda|rocm|none | [cuda, rocm]
#           pythonArch: native|x86-emulated
#         models:                     # ordered list; [0] is default recommendation
#           - name: <model-id>
#             size: "~1.5GB"
#             description: <text>
#             requirements:
#               ramGb: <number>
#               diskGb: <number>
#               gpu: required|recommended|optional   # optional
#             performance: <text>     # optional
#         unsupported:                # mutually exclusive with models
#           reason: <why>
#           userAction: <what user should do>
#           retryHint: <how to retry>
#         notes: [<text>, ...]        # general guidance (was "caveats")
#         customModelHint:            # shown beside the "custom model"
#           description: <text>       # what kind of model is acceptable
#                                     # in this env (architecture family,
#                                     # backend constraints, resource hint)
#           links:                    # where to look up valid IDs
#             - label: <text>
#               url: <url>
# ============================================================

services:
  # ------------------------------------------------------------
  # Whisper STT (语音转写)
  # ------------------------------------------------------------
  whisper-stt:
    - match: { os: darwin, arch: arm64 }
      models:
        - name: mlx-community/whisper-large-v3-turbo
          size: ~1.5GB
          description: 速度快、质量高（MLX 加速，推荐）
          requirements: { ramGb: 4, diskGb: 2 }
          performance: 实时 10x+
        - name: mlx-community/whisper-large-v3-mlx
          size: ~3GB
          description: 最高质量，速度较慢
          requirements: { ramGb: 6, diskGb: 3.5 }
        - name: mlx-community/whisper-small-mlx
          size: ~500MB
          description: 轻量版，低配机器可用
          requirements: { ramGb: 2, diskGb: 1 }
      customModelHint:
        description: 'MLX 后端：mlx-community 下的 whisper 量化模型（MLX 张量格式）'
        links:
          - { label: 'mlx-community / whisper 列表', url: 'https://huggingface.co/mlx-community?search_models=whisper' }

    - match: { os: darwin, arch: x64 }
      models:
        - name: large-v3-turbo
          size: ~1.5GB
          description: faster-whisper turbo（CTranslate2，推荐）
          requirements: { ramGb: 4, diskGb: 2 }
          performance: CPU 实时 2-3x
        - name: large-v3
          size: ~3GB
          description: 最高质量
          requirements: { ramGb: 6, diskGb: 3.5 }
        - name: base
          size: ~150MB
          description: 轻量版，低配机器可用
          requirements: { ramGb: 2, diskGb: 0.5 }
          performance: CPU 实时 1-2x
      notes:
        - Intel Mac 不支持 MLX，使用 faster-whisper 后端
      customModelHint:
        description: 'faster-whisper 后端：内置 ID（tiny/base/small/medium/large-v1~v3/large-v3-turbo/distil-large-v3）或 HF 上 CTranslate2 转换的 whisper 模型'
        links:
          - { label: 'faster-whisper 内置模型列表', url: 'https://github.com/SYSTRAN/faster-whisper#available-models' }
          - { label: 'HF CTranslate2 whisper 模型', url: 'https://huggingface.co/models?library=ctranslate2&search=whisper' }

    # Windows ARM64 native Python — faster-whisper pulls PyAV/ctranslate2 which
    # have no win-arm64 prebuilt wheels; pip falls back to source build and
    # fails on Cython compile. Same pattern as llm-postprocess: gate behind x86
    # Python emulation.
    - match: { os: win32, arch: arm64, pythonArch: native }
      unsupported:
        reason: faster-whisper 间接依赖 PyAV / ctranslate2 等 C 扩展，在 Windows ARM64 没有预编译 wheel，原生 ARM Python 装不上。
        userAction: 请安装 x86 Python 3.10+（python.org 64-bit Windows 安装包，Microsoft Store 版也可）
        retryHint: 安装好 x86 Python 后，关闭此弹窗再次点击「安装」，会自动按 x86 模式重新匹配

    - match: { os: win32, arch: arm64, pythonArch: x86-emulated }
      models:
        - name: base
          size: ~150MB
          description: faster-whisper base（x86 模拟运行，推荐）
          requirements: { ramGb: 2, diskGb: 0.5 }
          performance: CPU 偏慢
        - name: large-v3-turbo
          size: ~1.5GB
          description: faster-whisper turbo（x86 模拟，仅推荐高内存机器）
          requirements: { ramGb: 4, diskGb: 2 }
      notes:
        - x86 Python 运行在 ARM 模拟层上，性能比原生略低
      customModelHint:
        description: 'faster-whisper 后端 (x86 模拟 Python)：内置 ID（tiny/base/small/medium/large-v1~v3/large-v3-turbo/distil-large-v3）'
        links:
          - { label: 'faster-whisper 内置模型列表', url: 'https://github.com/SYSTRAN/faster-whisper#available-models' }

    - match: { os: [win32, linux], gpu: [cuda, rocm] }
      models:
        - name: large-v3-turbo
          size: ~1.5GB
          description: faster-whisper turbo（CTranslate2,GPU 推荐）
          requirements: { ramGb: 4, diskGb: 2 }
          performance: GPU 10x+
        - name: large-v3
          size: ~3GB
          description: 最高质量
          requirements: { ramGb: 6, diskGb: 3.5, gpu: recommended }
        - name: base
          size: ~150MB
          description: 轻量版，低配机器可用
          requirements: { ramGb: 2, diskGb: 0.5 }
      notes:
        - GPU 加速需 CUDA 12+ 或 ROCm 5.7+
      customModelHint: '自定义必须是 faster-whisper 内置 ID（tiny / base / small / medium / large-v1~v3 / large-v3-turbo / distil-large-v3 等）或 CTranslate2 转换模型'

    - match: { os: [win32, linux], gpu: none }
      models:
        - name: base
          size: ~150MB
          description: 轻量版，CPU 实时（推荐）
          requirements: { ramGb: 2, diskGb: 0.5 }
          performance: CPU 实时 1-2x
        - name: large-v3-turbo
          size: ~1.5GB
          description: faster-whisper turbo（CPU 偏慢）
          requirements: { ramGb: 4, diskGb: 2 }
          performance: CPU 实时 2x，可能偏慢
      notes:
        - 纯 CPU 上 large 模型偏慢，默认 base
      customModelHint:
        description: 'faster-whisper 后端：内置 ID（tiny/base/small/medium/large-v1~v3/distil-large-v3）。纯 CPU 推荐 base 或 small'
        links:
          - { label: 'faster-whisper 内置模型列表', url: 'https://github.com/SYSTRAN/faster-whisper#available-models' }

  # ------------------------------------------------------------
  # MLX TTS (语音合成)
  # ------------------------------------------------------------
  mlx-tts:
    - match: { os: darwin, arch: arm64 }
      models:
        - name: mlx-community/Kokoro-82M-bf16
          size: ~160MB
          description: 本地轻量高质量语音合成（MLX，推荐）
          requirements: { ramGb: 2, diskGb: 0.5 }
          performance: 实时 5x+
        - name: edge-tts
          size: ~20MB
          description: 微软云端，备选（需联网）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 取决于网络
      customModelHint:
        description: 'MLX-Audio 后端：mlx-community 下的 TTS 模型（Kokoro / StyleTTS2 量化版）；或填关键字 edge-tts 走云端'
        links:
          - { label: 'mlx-community / TTS 模型', url: 'https://huggingface.co/mlx-community?search_models=tts' }
          - { label: 'edge-tts voice 列表', url: 'https://github.com/rany2/edge-tts#changing-voices' }

    - match: { os: darwin, arch: x64 }
      models:
        - name: edge-tts
          size: ~20MB
          description: 微软云端语音，高质量、需联网（推荐）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 取决于网络
      notes:
        - Intel Mac 不支持 MLX-Audio，使用 edge-tts
      customModelHint:
        description: 'edge-tts 云端服务（无本地模型下载），通过 voice 名选择音色'
        links:
          - { label: 'edge-tts voice 列表', url: 'https://github.com/rany2/edge-tts#changing-voices' }

    # Windows ARM64 native Python — edge-tts pulls aiohttp and piper-tts
    # pulls piper_phonemize; neither has win-arm64 prebuilt wheels. SAPI is
    # the only path that works: pyttsx3 (pure python) + pywin32 (ships
    # win-arm64 wheels from cp310). Audio quality is older Windows TTS but
    # it's fully offline and installs cleanly without MSVC.
    - match: { os: win32, arch: arm64, pythonArch: native }
      models:
        - name: sapi
          size: ~5MB
          description: Windows 内置语音（SAPI，离线可用；ARM64 唯一可装的路径）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 实时 1x
      notes:
        - 'ARM64 上 edge-tts / piper 受 pip wheel 限制装不上。如需更高质量请安装 x86 Python（参考 LLM 服务的 x86 安装引导）。'
      customModelHint:
        description: 'SAPI 后端（Windows 内置 TTS）：通过 pyttsx3 调用，无云端依赖；音色由 Windows 系统决定'

    - match: { os: win32, arch: arm64, pythonArch: x86-emulated }
      models:
        - name: edge-tts
          size: ~20MB
          description: 微软云端语音（x86 模拟运行，推荐）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 取决于网络
        - name: sapi
          size: ~5MB
          description: Windows 内置语音，离线可用
          requirements: { ramGb: 1, diskGb: 0.1 }
      notes:
        - x86 Python 运行在 ARM 模拟层上，性能比原生略低；edge-tts 与 sapi 都基本不受影响
      customModelHint:
        description: 'edge-tts 云端服务 / sapi Windows 内置（x86 模拟 Python）'
        links:
          - { label: 'edge-tts voice 列表', url: 'https://github.com/rany2/edge-tts#changing-voices' }

    - match: { os: win32 }
      models:
        - name: edge-tts
          size: ~20MB
          description: 微软云端语音，高质量、需联网（推荐）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 取决于网络
        - name: piper
          size: ~80MB
          description: Piper 开源离线 TTS（ONNX，默认 zh_CN-huayan-medium）
          requirements: { ramGb: 2, diskGb: 0.2 }
          performance: CPU 实时
        - name: sapi
          size: ~5MB
          description: Windows 内置语音，离线可用（音色较老）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 实时 1x
      notes:
        - edge-tts 需要联网；piper/sapi 完全离线
      customModelHint:
        description: '可填 piper voice ID（zh_CN-huayan-medium / en_US-amy-medium 等）、edge-tts（云端）、sapi（Windows 内置）'
        links:
          - { label: 'piper voice 全列表', url: 'https://github.com/rhasspy/piper/blob/master/VOICES.md' }
          - { label: 'edge-tts voice 列表', url: 'https://github.com/rany2/edge-tts#changing-voices' }

    - match: { os: linux }
      models:
        - name: edge-tts
          size: ~20MB
          description: 微软云端语音，高质量、需联网（推荐）
          requirements: { ramGb: 1, diskGb: 0.1 }
          performance: 取决于网络
        - name: piper
          size: ~80MB
          description: Piper 开源离线 TTS（ONNX，默认 zh_CN-huayan-medium）
          requirements: { ramGb: 2, diskGb: 0.2 }
          performance: CPU 实时
      notes:
        - 离线选项 piper 默认下载中文 huayan-medium 模型；可手填 en_US-amy-medium 等
      customModelHint:
        description: '可填 piper voice ID（zh_CN-huayan-medium / en_US-amy-medium 等）或 edge-tts（云端）'
        links:
          - { label: 'piper voice 全列表', url: 'https://github.com/rhasspy/piper/blob/master/VOICES.md' }
          - { label: 'edge-tts voice 列表', url: 'https://github.com/rany2/edge-tts#changing-voices' }

  # ------------------------------------------------------------
  # Embedding (语义向量)
  # ------------------------------------------------------------
  embedding-model:
    - match: { os: darwin, arch: arm64 }
      models:
        - name: mlx-community/Qwen3-Embedding-0.6B-4bit-DWQ
          size: ~400MB
          description: Qwen3 中文向量 0.6B（MLX 4bit-DWQ，推荐）
          requirements: { ramGb: 2, diskGb: 1 }
          performance: 实时
        - name: mlx-community/Qwen3-Embedding-4B-4bit-DWQ
          size: ~2.5GB
          description: Qwen3 中文向量 4B（更高质量，32GB+ 内存推荐）
          requirements: { ramGb: 8, diskGb: 3 }
          performance: 实时
        - name: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
          size: ~5GB
          description: Qwen3 中文向量 8B（最高质量，48GB+ 内存）
          requirements: { ramGb: 16, diskGb: 6 }
          performance: 实时
      customModelHint:
        description: 'MLX 后端：mlx-community 下的 embedding 量化模型（4bit-DWQ / mxfp8）'
        links:
          - { label: 'mlx-community / embedding 模型', url: 'https://huggingface.co/mlx-community?search_models=embedding' }

    # Verified against fastembed 0.8 TextEmbedding.list_supported_models():
    # jinaai/jina-embeddings-v2-base-zh is in the catalog (768 dim, 640MB) and
    # is explicitly bilingual (Chinese + English). multilingual-e5-large is
    # also catalogued for higher-quality GPU use cases.

    - match: { os: darwin, arch: x64 }
      models:
        - name: jinaai/jina-embeddings-v2-base-zh
          size: ~640MB
          description: Jina 中英双语向量 base（768 dim，sentence-transformers，推荐）
          requirements: { ramGb: 2, diskGb: 1 }
          performance: CPU 实时
        - name: intfloat/multilingual-e5-large
          size: ~2.3GB
          description: 多语言向量 large（1024 dim，更高质量，Intel Mac CPU 偏慢）
          requirements: { ramGb: 4, diskGb: 3 }
          performance: CPU 偏慢
      notes:
        - Intel Mac 不支持 MLX，使用 sentence-transformers 后端
        - 中英文都支持
      customModelHint:
        description: 'sentence-transformers 后端：HuggingFace 上任意 sentence-transformers 兼容的 embedding 模型（BERT-family encoder，输出固定维度向量）'
        links:
          - { label: 'HF sentence-transformers 模型', url: 'https://huggingface.co/models?library=sentence-transformers&sort=likes' }

    # Windows ARM64: sqlite-vec upstream has no prebuilt windows-arm64 binary
    # (verified: sqlite-vec@0.1.9 optionalDependencies list omits it; npm has
    # no sqlite-vec-windows-arm64 package). The sidecar would run fine, but
    # the API main process (native ARM64 Node) cannot load an x86 .dll across
    # arch — so vectors never persist. Block install with a clear reason.
    - match: { os: win32, arch: arm64 }
      unsupported:
        reason: sqlite-vec（向量索引存储扩展）上游没有 windows-arm64 预编译 binary。Embedding sidecar 本身能跑，但 API 主进程是 ARM64 Node，无法跨架构加载 x86 binary，向量无法落盘。
        userAction: Windows ARM64 暂不支持向量搜索。BM25 关键字搜索已自动可用，无需任何配置；如需向量搜索请在 x64 Windows / macOS / Linux 上启用。
        retryHint: 等待上游 sqlite-vec (https://github.com/asg017/sqlite-vec) 发布 windows-arm64 binary 后重试。

    # Linux ARM64: fastembed backend + sqlite-vec-linux-arm64 prebuilt OK.
    # fastembed has a hardcoded model whitelist verified via
    # TextEmbedding.list_supported_models() in fastembed 0.8.
    - match: { os: linux, arch: arm64 }
      models:
        - name: jinaai/jina-embeddings-v2-base-zh
          size: ~640MB
          description: Jina 中英双语向量 base（768 dim，fastembed/ONNX，ARM64 推荐）
          requirements: { ramGb: 2, diskGb: 1 }
          performance: CPU 实时
        - name: BAAI/bge-small-zh-v1.5
          size: ~90MB
          description: BGE 中文 small（512 dim，轻量但中文专用，英文弱）
          requirements: { ramGb: 2, diskGb: 0.2 }
          performance: CPU 实时
      notes:
        - 'ARM64 走 fastembed 后端，受白名单限制（已对照 fastembed.TextEmbedding.list_supported_models() 选型）'
        - '如需更高质量请安装 x86 Python（参考 LLM 服务的 x86 安装引导），切换到 sentence-transformers 后端'
      customModelHint:
        description: 'fastembed 后端：受白名单限制，只能填 fastembed.TextEmbedding.list_supported_models() 返回的模型 ID（即 fastembed 已转换并打包成 ONNX 的那批）'
        links:
          - { label: 'fastembed 支持的 text embedding 模型', url: 'https://qdrant.github.io/fastembed/examples/Supported_Models/' }

    # Windows/Linux x64 + GPU: sentence-transformers backend, anything HF goes
    - match: { os: [win32, linux], arch: x64, gpu: [cuda, rocm] }
      models:
        - name: intfloat/multilingual-e5-large
          size: ~2.3GB
          description: 多语言向量 large（1024 dim，GPU 推荐，中英双语，最高质量）
          requirements: { ramGb: 4, diskGb: 3, gpu: recommended }
          performance: GPU 实时
        - name: jinaai/jina-embeddings-v2-base-zh
          size: ~640MB
          description: Jina 中英双语向量 base（768 dim，备选）
          requirements: { ramGb: 2, diskGb: 1 }
          performance: CPU 实时
      notes:
        - 中英文都支持
      customModelHint:
        description: 'sentence-transformers 后端：HuggingFace 上任意 sentence-transformers 兼容的 embedding 模型（BERT-family encoder）；GPU 推荐 768/1024 dim 多语言模型'
        links:
          - { label: 'HF sentence-transformers 模型', url: 'https://huggingface.co/models?library=sentence-transformers&sort=likes' }

    # Windows/Linux x64 CPU (sentence-transformers, no GPU)
    - match: { os: [win32, linux], arch: x64 }
      models:
        - name: jinaai/jina-embeddings-v2-base-zh
          size: ~640MB
          description: Jina 中英双语向量 base（768 dim，CPU 通用，推荐）
          requirements: { ramGb: 2, diskGb: 1 }
          performance: CPU 实时
        - name: intfloat/multilingual-e5-large
          size: ~2.3GB
          description: 多语言向量 large（1024 dim，质量更高但 CPU 偏慢）
          requirements: { ramGb: 4, diskGb: 3, gpu: recommended }
          performance: CPU 偏慢，GPU 实时
      notes:
        - 中英文都支持
        - '⚠ 切换 jina (768 dim) ↔ e5-large (1024 dim) 时维度变化，需重建 memory 索引'
      customModelHint:
        description: 'sentence-transformers 后端：HuggingFace 上任意 sentence-transformers 兼容的 embedding 模型（BERT-family encoder）；CPU 建议 ≤768 dim，1024 dim 偏慢'
        links:
          - { label: 'HF sentence-transformers 模型', url: 'https://huggingface.co/models?library=sentence-transformers&sort=likes' }

  # ------------------------------------------------------------
  # LLM Postprocess (转写纠正)
  # ------------------------------------------------------------
  llm-postprocess:
    - match: { os: darwin, arch: arm64 }
      models:
        - name: mlx-community/Qwen3.5-35B-A3B-4bit
          size: ~20GB
          description: Qwen3.5 35B MoE，高质量纠错（MLX，推荐）
          requirements: { ramGb: 48, diskGb: 22 }
          performance: 生成 ~30 tok/s
        - name: mlx-community/Qwen2.5-14B-Instruct-4bit
          size: ~8GB
          description: 中等质量，32GB+ 内存推荐
          requirements: { ramGb: 24, diskGb: 9 }
        - name: mlx-community/Qwen2.5-7B-Instruct-4bit
          size: ~4GB
          description: 轻量版，16GB 内存可用
          requirements: { ramGb: 12, diskGb: 5 }
      notes:
        - Qwen3.5-35B 需要 48GB+ 统一内存
      customModelHint:
        description: 'MLX 后端：mlx-community 下的 Instruct / Chat 量化模型（CausalLM）。4bit 量化模型内存占用 ≈ 参数量 × 0.5'
        links:
          - { label: 'mlx-community / text-generation 模型', url: 'https://huggingface.co/mlx-community?pipeline_tag=text-generation&sort=likes' }

    - match: { os: darwin, arch: x64 }
      models:
        - name: Qwen/Qwen2.5-3B-Instruct
          size: ~6GB
          description: transformers 后端，CPU/GPU 都能跑（推荐）
          requirements: { ramGb: 8, diskGb: 7 }
          performance: CPU 偏慢，GPU 流畅
        - name: Qwen/Qwen2.5-7B-Instruct
          size: ~14GB
          description: 更高质量，GPU 推荐
          requirements: { ramGb: 16, diskGb: 15, gpu: recommended }
      notes:
        - Intel Mac 不支持 MLX，使用 transformers 后端
      customModelHint:
        description: 'transformers 后端：HuggingFace 上的因果语言模型（CausalLM，pipeline_tag=text-generation）。CPU 推荐 ≤3B'
        links:
          - { label: 'HF text-generation 模型', url: 'https://huggingface.co/models?pipeline_tag=text-generation&sort=likes' }

    - match: { os: win32, arch: arm64, pythonArch: native }
      unsupported:
        reason: transformers + safetensors 在 Windows ARM64 没有预编译 wheel，原生 ARM Python 装不上
        userAction: 请安装 x86 Python 3.10+（python.org 上下载 64-bit Windows 安装包，Microsoft Store 版也可）
        retryHint: 安装好 x86 Python 后，关闭此弹窗再次点击「安装」，会自动按 x86 模式重新匹配

    - match: { os: win32, arch: arm64, pythonArch: x86-emulated }
      models:
        - name: Qwen/Qwen2.5-3B-Instruct
          size: ~6GB
          description: transformers 后端（x86 模拟运行）
